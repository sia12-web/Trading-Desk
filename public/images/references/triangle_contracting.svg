<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Converging Trendlines -->
  <line x1="50" y1="50" x2="350" y2="120" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5 5" />
  <line x1="50" y1="250" x2="350" y2="180" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5 5" />
  
  <!-- Waves: A-B-C-D-E -->
  <path d="M 50 50 L 110 236 L 170 80 L 230 205 L 290 110 L 350 150" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Labels -->
  <text x="50" y="40" fill="white" font-size="16" font-weight="bold">A</text>
  <text x="100" y="260" fill="white" font-size="16" font-weight="bold">B</text>
  <text x="160" y="70" fill="white" font-size="16" font-weight="bold">C</text>
  <text x="220" y="230" fill="white" font-size="16" font-weight="bold">D</text>
  <text x="280" y="100" fill="white" font-size="16" font-weight="bold">E</text>
</svg>
